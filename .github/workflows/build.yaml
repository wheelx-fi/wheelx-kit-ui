name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'Production' || 'Development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nixpacks
        run: |
          curl -sSL https://nixpacks.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build image with Nixpacks
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_DOMAIN: ${{ vars.NEXT_PUBLIC_APP_DOMAIN }}
          NEXT_PUBLIC_ENABLE_TESTNETS: ${{ vars.NEXT_PUBLIC_ENABLE_TESTNETS }}
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID }}
        run: |
          TAG_BRANCH="${IMAGE_NAME}:${GITHUB_REF_NAME}"
          TAG_SHA="${IMAGE_NAME}:${GITHUB_SHA}"
          nixpacks build . --name "$TAG_BRANCH" --config ./nixpacks.toml
          docker tag "$TAG_BRANCH" "$TAG_SHA"

      - name: Push image
        run: |
          TAG_BRANCH="${IMAGE_NAME}:${GITHUB_REF_NAME}"
          TAG_SHA="${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "$TAG_BRANCH"
          docker push "$TAG_SHA"
